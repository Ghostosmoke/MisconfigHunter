# ❌ VULNERABLE: GCS bucket with allUsers IAM binding
resources:
- name: vulnerable-bucket
  type: storage.v1.bucket
  properties:
    location: US
    iamConfiguration:
      uniformBucketLevelAccess:
        enabled: false
    acl:
    - entity: allUsers  # ⚠️ TRIGGER: public access
      role: READER

---
# ✅ SECURE: GCS bucket without public IAM bindings
resources:
- name: secure-bucket
  type: storage.v1.bucket
  properties:
    location: US
    iamConfiguration:
      uniformBucketLevelAccess:
        enabled: true  # ✅ OK: enforce IAM-only access
      publicAccessPrevention: enforced  # ✅ OK: block public access
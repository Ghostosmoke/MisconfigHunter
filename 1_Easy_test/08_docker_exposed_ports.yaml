# ❌ VULNERABLE: Port bound to 0.0.0.0 (all interfaces)
version: '3.8'
services:
  web:
    image: nginx:1.24
    ports:
      - "0.0.0.0:80:80"  # ⚠️ TRIGGER: bound to all interfaces
      - "443:443"  # ⚠️ TRIGGER: implicit 0.0.0.0

---
# ✅ SECURE: Port bound to localhost or specific IP
version: '3.8'
services:
  web:
    image: nginx:1.24
    ports:
      - "127.0.0.1:80:80"  # ✅ OK: localhost only
      - "10.0.0.5:443:443"  # ✅ OK: specific interface
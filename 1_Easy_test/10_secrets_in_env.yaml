# ❌ VULNERABLE: Sensitive data in plaintext env vars
apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-pod
spec:
  containers:
  - name: app
    image: nginx:1.24
    env:
    - name: DB_PASSWORD  # ⚠️ TRIGGER: sensitive name + plaintext value
      value: "supersecret123"
    - name: API_KEY  # ⚠️ TRIGGER: sensitive name + plaintext value
      value: "sk-abc123"

---
# ✅ SECURE: Using Kubernetes Secrets or valueFrom
apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
spec:
  containers:
  - name: app
    image: nginx:1.24
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:  # ✅ OK: reference to Secret
          name: app-secrets
          key: db-password
    - name: CONFIG_FLAG  # ✅ OK: non-sensitive variable
      value: "production"
# ❌ VULNERABLE: Using :latest or no tag
apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-pod
spec:
  containers:
  - name: app-latest
    image: nginx:latest  # ⚠️ TRIGGER: :latest tag
  - name: app-no-tag
    image: nginx  # ⚠️ TRIGGER: no tag/digest

---
# ✅ SECURE: Using specific version or digest
apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
spec:
  containers:
  - name: app-versioned
    image: nginx:1.24.0-alpine  # ✅ OK: specific version
  - name: app-digest
    image: nginx@sha256:abc123...  # ✅ OK: immutable digest
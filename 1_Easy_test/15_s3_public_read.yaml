# ❌ VULNERABLE: S3 bucket with PublicRead ACL
AWSTemplateFormatVersion: '2010-09-09'
Resources:
  VulnerableBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead  # ⚠️ TRIGGER: public read ACL
      BucketName: my-public-data

---
# ✅ SECURE: Private ACL or bucket policy with conditions
AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private  # ✅ OK: private by default
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
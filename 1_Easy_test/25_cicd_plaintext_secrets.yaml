# ❌ VULNERABLE: Secrets hardcoded in pipeline config
# .gitlab-ci.yml
stages:
  - deploy

deploy_production:
  stage: deploy
  script:
    - export DB_PASSWORD="prod_secret_123"  # ⚠️ TRIGGER: plaintext secret
    - export API_KEY="sk-prod-abc123"  # ⚠️ TRIGGER: plaintext secret
    - ./deploy.sh
  only:
    - main

---
# ✅ SECURE: Using CI/CD masked variables or external secrets
# .gitlab-ci.yml
stages:
  - deploy

deploy_production:
  stage: deploy
  script:
    # ✅ OK: using masked CI/CD variables (set in GitLab UI)
    - export DB_PASSWORD="$PROD_DB_PASSWORD"
    - export API_KEY="$PROD_API_KEY"
    # ✅ OK: or using external secrets manager
    - aws secretsmanager get-secret-value --secret-id prod/creds | jq -r '.SecretString'
    - ./deploy.sh
  only:
    - main
# ❌ VULNERABLE: Secret старше 90 дней без ротации
AWSTemplateFormatVersion: '2010-09-09'
Resources:
  VulnerableSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: production-db-password
      Description: Database password
      # ⚠️ TRIGGER: отсутствует ReplicaConfiguration для ротации
      # ⚠️ TRIGGER: нет указания даты последнего изменения

---
# ✅ SECURE: Secret с политикой ротации
AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecureSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: production-db-password
      Description: Database password
      ReplicaConfiguration:
        - Region: us-west-2
      RotationRules:
        AutomaticallyAfterDays: 30  # ✅ OK: ротация каждые 30 дней
      RotationLambdaARN: !GetAtt RotationLambda.Arn
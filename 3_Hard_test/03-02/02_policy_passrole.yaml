AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PassRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - "iam:PassRole"  # ⚠️ Часть комбинации для эскалации
          Resource: "arn:aws:iam::*:role/*"
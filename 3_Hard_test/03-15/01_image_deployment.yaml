# ❌ VULNERABLE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: app
        image: registry.company.com/app:latest

---
# ✅ SECURE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: production
  annotations:
    cosign.sigstore.dev/signature: "MEUCIQD..."
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: app
        image: registry.company.com/app@sha256:abc123...
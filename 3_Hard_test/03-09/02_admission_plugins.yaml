# ❌ VULNERABLE
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionWebhookConfiguration
metadata:
  name: empty-webhook
webhooks: []

---
# ✅ SECURE
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionWebhookConfiguration
metadata:
  name: security-webhook
webhooks:
- name: policy.k8s.io
  clientConfig:
    service:
      name: policy-webhook
      namespace: kube-system
      path: /validate
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["pods"]
  failurePolicy: Fail
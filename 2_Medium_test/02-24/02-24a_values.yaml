# ❌ VULNERABLE: values.yaml без schema validation
# charts/my-app/values.yaml
replicaCount: 1

image:
  repository: nginx
  tag: latest  # ⚠️ TRIGGER: нет валидации тега
  pullPolicy: IfNotPresent


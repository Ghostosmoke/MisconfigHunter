# ❌ VULNERABLE: ServiceAccount с включённым авто-монтированием
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: default
automountServiceAccountToken: true  # ⚠️ TRIGGER: явно включено

---
# ✅ SECURE: ServiceAccount с отключённым авто-монтированием
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: default
automountServiceAccountToken: false  # ✅ OK: отключено